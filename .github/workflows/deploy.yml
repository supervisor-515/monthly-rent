name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      # GitHub Pages 환경이 이 브랜치로 배포되도록 제한되어 있어 실제 배포 트리거로 유지
      - claude/sweet-meitner-8gtlz4
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1건만 유지
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 최초 1회: 저장소 Settings → Pages → Source 를 "GitHub Actions" 로 설정해야 합니다.
      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 정적 사이트이므로 빌드 없이 루트를 그대로 업로드
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
