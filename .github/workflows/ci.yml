name: CI

on:
  push:
    branches:
      - main
      - "claude/**"
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run unit tests (의존성 없음)
        run: |
          node tests/calc.test.js
          node tests/notify.test.js

      - name: Syntax check (모든 JS 파일)
        run: |
          node --check js/calc.js
          node --check js/notify-store.js
          node --check js/app.js
          node --check sw.js
